server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # SSE — disable buffering so events reach the browser immediately
    location /api/live {
        proxy_pass http://back:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # Proxy all other API calls to the backend
    location /api/ {
        proxy_pass http://back:3001;
        proxy_set_header Host $host;
    }

    # Mock control panel (page + API actions)
    location /panel {
        proxy_pass http://test:3002/mock;
        proxy_set_header Host $host;
    }

    location /mock/ {
        proxy_pass http://test:3002/mock/;
        proxy_set_header Host $host;
    }

    # Test environment — API calls go to mock server
    location /test/api/ {
        rewrite ^/test/api/(.*) /api/$1 break;
        proxy_pass http://test:3002;
        proxy_set_header Host $host;
    }

    # Test environment — redirect /test → /test/ using $http_host to preserve the browser port
    location = /test {
        return 301 $scheme://$http_host/test/;
    }

    # Test environment — static SPA (strip /test prefix, front-test serves from root)
    location /test/ {
        proxy_pass http://front-test:80/;
        proxy_set_header Host $host;
        absolute_redirect off;
    }

    # SPA fallback — all other paths serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
