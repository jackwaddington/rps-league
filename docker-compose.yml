services:
  back:
    build: ./back
    ports:
      - "3001:3001"
    env_file:
      - ./back/.env
    volumes:
      - rps-db:/app/data
    restart: unless-stopped

  test:
    build: ./test
    ports:
      - "3002:3002"
    restart: unless-stopped

  front2:
    build:
      context: ./front2
      args:
        VITE_API_BASE: ""
    ports:
      - "8080:80"
    depends_on:
      - back
      - front-test
    restart: unless-stopped

  front-test:
    build:
      context: ./front2
      args:
        VITE_API_BASE: "/test"
        VITE_BASE_PATH: "/test/"
        NGINX_CONF: nginx-test.conf
    depends_on:
      - test
    restart: unless-stopped

volumes:
  rps-db:
